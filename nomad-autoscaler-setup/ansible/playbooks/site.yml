---
- name: Configure base host resolution
  hosts: all
  become: true
  roles:
    - base

- name: Configure Consul
  hosts: all
  become: true
  roles:
    - consul

- name: Configure Nomad servers
  hosts: nomad_servers
  become: true
  roles:
    - nomad_server

- name: Configure Nomad clients
  hosts: nomad_clients
  become: true
  roles:
    - nomad_client
