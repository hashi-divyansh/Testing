---
- name: Ensure Nomad directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /etc/nomad.d
    - /opt/nomad/data

- name: Download Nomad binary archive
  ansible.builtin.get_url:
    url: "{{ nomad_zip_url }}"
    dest: "{{ nomad_zip_tmp_path }}"
    mode: "0644"

- name: Extract Nomad binary
  ansible.builtin.unarchive:
    src: "{{ nomad_zip_tmp_path }}"
    dest: /usr/local/bin
    remote_src: true
    creates: /usr/local/bin/nomad

- name: Ensure Nomad binary is executable
  ansible.builtin.file:
    path: /usr/local/bin/nomad
    mode: "0755"

- name: Deploy Nomad server configuration
  ansible.builtin.template:
    src: server.hcl.j2
    dest: /etc/nomad.d/server.hcl
    mode: "0644"
  notify: Restart nomad

- name: Deploy Nomad systemd unit
  ansible.builtin.template:
    src: nomad.service.j2
    dest: /etc/systemd/system/nomad.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart nomad

- name: Ensure Nomad service is enabled and started
  ansible.builtin.systemd:
    name: nomad
    daemon_reload: true
    enabled: true
    state: started

- name: Remove downloaded Nomad archive
  ansible.builtin.file:
    path: "{{ nomad_zip_tmp_path }}"
    state: absent
